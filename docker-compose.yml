services:
  opcua-collector:
    build: .
    container_name: opcua_collector
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MYSQL_HOST: host.docker.internal
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: opcua_data
      OPC_SERVER_URL: opc.tcp://host.docker.internal:53530/OPCUA/SimulationServer
